<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>

    <style>
        body{
            background-color: #f2f2f2;
            font-family: Helvetica, Arial, sans-serif;
            padding: 60px;
        }

        ul{
            color: #8d8d8d;
            font-size: 18px;
            line-height: 2;
        }

        li span{
            background-color: #d9d9d9;
            color: #222;
            padding: 4px 8px;
        }
    </style>
</head>

<body>

    <ul>
        <li><span>attendance</span></li>
        <li><span>missed class attendance form</span></li>
        <li><span>missed CT form</span></li>
    </ul>

</body>
</html>
